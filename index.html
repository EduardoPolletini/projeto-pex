<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =========================================================================
        // CONFIGURAÇÕES DO FIREBASE INTEGRADAS
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCksZLf4pXjUW2dBp9dcnQk6eEImqkFGGE",
            authDomain: "aquavision-94b0a.firebaseapp.com",
            databaseURL: "https://aquavision-94b0a-default-rtdb.firebaseio.com",
            projectId: "aquavision-94b0a",
            storageBucket: "aquavision-94b0a.firebasestorage.app",
            messagingSenderId: "350037089938",
            appId: "1:350037089938:web:3fb921ccc8f7f07c21d04b",
            measurementId: "G-TSY2R7R77C"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);
        // =========================================================================

        const btnStart = document.getElementById('btn-start');
        const cameraSection = document.getElementById('camera-section');
        const videoFeed = document.getElementById('video-feed');
        const btnCapture = document.getElementById('btn-capture');
        const canvas = document.getElementById('canvas');
        const loadingSpinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');
        const resultSection = document.getElementById('result-section');
        const draftDisplay = document.getElementById('draft-display');
        const btnReset = document.getElementById('btn-reset');

        let stream = null;

        btnStart.addEventListener('click', async () => {
            btnStart.style.display = 'none';
            cameraSection.style.display = 'flex';
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                videoFeed.srcObject = stream;
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                statusText.innerText = "Erro ao acessar a câmera. Verifique as permissões.";
            }
        });

        btnCapture.addEventListener('click', async () => {
            btnCapture.disabled = true;
            loadingSpinner.style.display = 'block';
            statusText.innerText = "Capturando e enviando...";

            canvas.width = videoFeed.videoWidth;
            canvas.height = videoFeed.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(videoFeed, 0, 0, canvas.width, canvas.height);

            const fileName = `leitura_${Date.now()}.png`;

            canvas.toBlob(async (blob) => {
                if (!blob) {
                    statusText.innerText = "Falha ao gerar imagem.";
                    return;
                }

                let timeoutId; 

                try {
                    const storageRef = ref(storage, fileName);
                    await uploadBytes(storageRef, blob);
                    
                    console.log(`[DEBUG] Arquivo salvo no Storage como: ${fileName}`);
                    statusText.innerText = "Processando no backend...";

                    const leiturasCollectionRef = collection(db, "Dispositivos", "D001", "leituras");
                    const q = query(leiturasCollectionRef, where("file", "==", fileName));
                    
                    const unsubscribe = onSnapshot(q, (querySnapshot) => {
                        console.log(`[DEBUG] onSnapshot disparado. Documentos encontrados: ${querySnapshot.size}`);
                        
                        querySnapshot.forEach((docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                console.log("[DEBUG] Dados do documento lido:", data);
                                
                                // AQUI ESTÁ A CORREÇÃO: Buscando a chave exata 'menor_leitura'
                                if (data.menor_leitura !== undefined && data.menor_leitura !== null) {
                                    clearTimeout(timeoutId); 
                                    mostrarResultado(data.menor_leitura);
                                    unsubscribe(); 
                                } else {
                                    console.log("[DEBUG] Documento existe, mas 'menor_leitura' ainda não foi preenchido pela Function.");
                                }
                            }
                        });
                    }, (error) => {
                        console.error("[ERRO FIREBASE] Falha ao ler o Firestore:", error);
                    });

                    timeoutId = setTimeout(() => {
                        unsubscribe();
                        statusText.innerText = "Tempo limite de processamento excedido.";
                        btnCapture.disabled = false;
                        loadingSpinner.style.display = 'none';
                        console.warn("[DEBUG] Timeout atingido. A function demorou muito ou o documento não deu match na Query.");
                    }, 45000); 

                } catch (error) {
                    console.error("Erro geral no processo: ", error);
                    statusText.innerText = "Erro ao processar. Verifique o console.";
                    btnCapture.disabled = false;
                    loadingSpinner.style.display = 'none';
                }
            }, 'image/png', 1.0); 
        });

        function mostrarResultado(valor) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            cameraSection.style.display = 'none';
            resultSection.style.display = 'flex';
            draftDisplay.innerText = `${valor} m`;
            
            btnCapture.disabled = false;
            loadingSpinner.style.display = 'none';
            statusText.innerText = "";
        }

        btnReset.addEventListener('click', () => {
            resultSection.style.display = 'none';
            btnStart.style.display = 'block';
            draftDisplay.innerText = '-- m';
        });

    </script>
